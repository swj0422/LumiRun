# ==============================================
# 逐光成长系统 (LumiRun) Nginx 反向代理配置
# 适用于 Windows 生产环境
# ==============================================

# HTTP 服务器配置 - 重定向到 HTTPS
server {
    listen 84;
    server_name lj.ryhengdeli.com;
    
    # 将 HTTP 请求重定向到 HTTPS
    rewrite ^(.*)$ https://$host$1 permanent;
}

# HTTPS 服务器配置
server {
    listen 443 ssl;
    server_name lj.ryhengdeli.com;
    
    # SSL 证书配置
    ssl_certificate 1_lj.ryhengdeli.com_bundle.crt;
    ssl_certificate_key 2_lj.ryhengdeli.com.key;
    
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 访问日志
    access_log logs/lj.ryhengdeli.com.access.log main;

    # 前端静态文件目录（指向前端构建产物）
    root D:/LumiRun/LumiRun/frontend/dist;
    index index.html;

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 静态资源缓存（1年）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API反向代理（转发到后端服务）
    location /api/ {
        proxy_pass http://localhost:8084/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 增加超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket支持
    location /ws/ {
        proxy_pass http://localhost:8084/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 前端路由支持（Vue Router history模式）
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
